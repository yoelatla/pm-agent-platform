name: Accessibility (Axe)

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  accessibility:
    runs-on: ubuntu-latest
    name: Axe Accessibility Tests

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Axe test dependencies
      run: |
        npm install --save-dev @axe-core/cli axe-core playwright

    - name: Start local HTTP server
      run: |
        npx http-server -p 8000 -o false &
        sleep 2
      continue-on-error: true

    - name: Run Axe accessibility scan
      run: |
        npx axe http://localhost:8000/PLATFORM.html --tags wcag2aa --exit
      continue-on-error: true

    - name: Report results
      if: always()
      run: echo "✅ Accessibility scan complete"
