name: Accessibility (Axe)

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  accessibility:
    runs-on: ubuntu-latest
    name: Axe Accessibility Tests

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Axe DevTools CLI
      run: npm install -g @axe-core/cli

    - name: Run Axe accessibility scan on HTML files
      run: |
        # Scan PLATFORM.html for accessibility issues
        axe ./PLATFORM.html --tags wcag2aa --exit
      continue-on-error: true

    - name: Install dependencies for testing
      run: |
        npm install --save-dev @testing-library/html axe-core
      continue-on-error: true

    - name: Report results
      if: always()
      run: echo "✅ Accessibility scan complete"
