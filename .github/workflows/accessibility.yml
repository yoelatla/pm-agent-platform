name: Accessibility (Axe)

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  accessibility:
    runs-on: ubuntu-latest
    name: Axe Accessibility Tests

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Start local HTTP server
      run: |
        python -m http.server 8000 -d . &
        sleep 2
        echo "HTTP Server started on port 8000"

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Run Axe accessibility scan
      run: |
        npx @axe-core/cli http://localhost:8000/PLATFORM.html --tags wcag2aa
      continue-on-error: true

    - name: Report results
      if: always()
      run: echo "✅ Accessibility scan complete"
